version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pms_db}
      POSTGRES_USER: ${POSTGRES_USER:-pms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pms_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-pms_user} -d ${POSTGRES_DB:-pms_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-django
    command: >
      sh -c "python manage.py makemigrations accounts --noinput &&
             python manage.py migrate --noinput &&
             python manage.py createsuperuser --noinput &&
             python manage.py seed_roles &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DATABASE_URL=postgres://${POSTGRES_USER:-pms_user}:${POSTGRES_PASSWORD:-pms_secret}@postgres:5432/${POSTGRES_DB:-pms_db}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://nextjs:3000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key-change-in-production}
      - JWT_ACCESS_TOKEN_LIFETIME=${JWT_ACCESS_TOKEN_LIFETIME:-60}
      - JWT_REFRESH_TOKEN_LIFETIME=${JWT_REFRESH_TOKEN_LIFETIME:-10080}
      - GOOGLE_OAUTH2_CLIENT_ID=${GOOGLE_OAUTH2_CLIENT_ID:-}
      - DJANGO_SUPERUSER_EMAIL=eugenemarkke@gmail.com
      - DJANGO_SUPERUSER_PASSWORD=password
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pms-nextjs
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - django

volumes:
  postgres_data:
